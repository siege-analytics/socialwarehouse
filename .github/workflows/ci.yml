name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: test_socialwarehouse
          POSTGRES_USER: swh_ci
          POSTGRES_PASSWORD: swh_ci_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: test_socialwarehouse
      POSTGRES_USER: swh_ci
      POSTGRES_PASSWORD: swh_ci_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: socialwarehouse.settings.test
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      CENSUS_YEAR: "2023"
      CENSUS_CONGRESSIONAL_SESSION: "118"
      CENSUS_STATE_FIPS: all

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            docker/python-computation/requirements.txt
            pyproject.toml

      - name: Install GDAL and geospatial system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev binutils libproj-dev postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          GDAL_VERSION=$(gdal-config --version)
          pip install "GDAL==${GDAL_VERSION}"
          pip install -r docker/python-computation/requirements.txt
          pip install -e ".[dev]"

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker build (core)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up environment
        run: |
          cp .env.example .env
          printf '\nPOSTGRES_PASSWORD=ci_build\nNEO4J_PASSWORD=ci_neo4j_12\nDJANGO_SECRET_KEY=ci-secret\n' >> .env

      - name: Build python-computation and web images
        run: docker compose build python-computation web
        timeout-minutes: 20

      - name: Start PostGIS and Redis
        run: docker compose up -d postgis redis

      - name: Wait for PostGIS
        run: |
          for i in $(seq 1 30); do
            docker compose exec postgis pg_isready && break || sleep 3
          done

      - name: Django check inside container
        run: docker compose run --rm python-computation python manage.py check

      - name: Tear down
        if: always()
        run: docker compose down -v
