# Social Warehouse — Docker Compose
# https://github.com/siege-analytics/socialwarehouse
#
# Profiles:
#   (default)  — PostGIS + Python computation
#   spark      — adds Spark master/worker/history
#   full       — adds Zeppelin notebook + Maven for JAR fetching
#
# Usage:
#   docker compose up -d                         # PostGIS + Python
#   docker compose --profile spark up -d         # + Spark cluster
#   docker compose --profile full up -d          # everything
#

services:

  # ---------------------------------------------------------------------------
  # PostGIS — always starts
  # ---------------------------------------------------------------------------
  postgis:
    image: ${POSTGIS_BASE_IMAGE:-postgis/postgis:17-3.5}
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=${POSTGRES_HOST_AUTH_METHOD:-scram-sha-256}
    ports:
      - "${POSTGRES_PORT:-54324}:5432"
    volumes:
      - swh_pg_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
        -c hba_file=/etc/postgresql/pg_hba.conf
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Django web — DSTK API + admin
  # ---------------------------------------------------------------------------
  web:
    build:
      context: docker/python-computation
      args:
        - UBUNTU_BASE_IMAGE=${UBUNTU_BASE_IMAGE:-ubuntu:24.04}
        - PYTHON_VENV_PATH=${PYTHON_VENV_PATH:-/opt/venv}
    image: swh-python-image
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=socialwarehouse.settings.development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgis
    command: >
      bash -c "
        pip install -e /opt/social_warehouse/ --quiet &&
        python -m django migrate --settings=socialwarehouse.settings.development --no-input &&
        python -m django runserver 0.0.0.0:8000 --settings=socialwarehouse.settings.development
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/social_warehouse/
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery worker — async geographic tasks
  # ---------------------------------------------------------------------------
  celery-worker:
    image: swh-python-image
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=socialwarehouse.settings.development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_HOST=postgis
    command: >
      bash -c "
        pip install -e /opt/social_warehouse/ --quiet &&
        celery -A socialwarehouse.celery_app worker -l info
      "
    volumes:
      - .:/opt/social_warehouse/
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Python computation — interactive shell for swh CLI + data loading
  # ---------------------------------------------------------------------------
  python-computation:
    build:
      context: docker/python-computation
      args:
        - UBUNTU_BASE_IMAGE=${UBUNTU_BASE_IMAGE:-ubuntu:24.04}
        - PYTHON_VENV_PATH=${PYTHON_VENV_PATH:-/opt/venv}
    image: swh-python-image
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=socialwarehouse.settings.development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgis
    volumes:
      - .:/opt/social_warehouse/
    depends_on:
      postgis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Spark cluster — only with --profile spark or --profile full
  # ---------------------------------------------------------------------------
  spark-master:
    image: swh-spark-image
    build:
      context: docker/spark
      args:
        - UBUNTU_BASE_IMAGE=${UBUNTU_BASE_IMAGE:-ubuntu:24.04}
        - PYTHON_VENV_PATH=${PYTHON_VENV_PATH:-/opt/venv}
    entrypoint: ["spark_entrypoint.sh", "master"]
    environment:
      - SPARK_NO_DAEMONIZE=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "4040:4040"
      - "7077:7077"
      - "9090:8080"
    volumes:
      - ./var/log/spark:/opt/spark/spark-events
      - ./code:/opt/spark/code
      - ./data:/opt/spark/data
      - ./jars:/opt/spark/user-jars
    profiles: [spark, full]

  spark-worker:
    image: swh-spark-image
    entrypoint: ["spark_entrypoint.sh", "worker"]
    environment:
      - SPARK_NO_DAEMONIZE=false
    ports:
      - "9091:8081"
    volumes:
      - ./docker/spark/spark-worker-defaults.properties:/opt/spark/conf/spark-defaults.conf:ro
      - ./var/log/spark:/opt/spark/spark-events
      - ./code:/opt/spark/code
      - ./data:/opt/spark/data
      - ./jars:/opt/spark/user-jars
    depends_on:
      spark-master:
        condition: service_healthy
    profiles: [spark, full]

  spark-history:
    image: swh-spark-image
    entrypoint: ["spark_entrypoint.sh", "history"]
    environment:
      - SPARK_NO_DAEMONIZE=false
    volumes:
      - ./docker/spark/spark-master-defaults.properties:/opt/spark/conf/spark-defaults.conf:ro
      - ./var/log/spark:/opt/spark/spark-events
    ports:
      - "18080:18080"
    depends_on:
      spark-master:
        condition: service_healthy
    profiles: [spark, full]

  # ---------------------------------------------------------------------------
  # Zeppelin notebook — only with --profile full
  # ---------------------------------------------------------------------------
  zeppelin:
    image: apache/zeppelin:0.11.1
    ports:
      - "8082:8080"
    restart: always
    environment:
      - ZEPPELIN_IN_DOCKER=true
    depends_on:
      postgis:
        condition: service_healthy
    profiles: [full]

  # ---------------------------------------------------------------------------
  # Maven — JAR fetcher for Sedona, only with --profile full
  # ---------------------------------------------------------------------------
  maven:
    image: maven:3.9-eclipse-temurin-21
    volumes:
      - ./.m2:/root/.m2
      - ./jars:/usr/src/app/jars
    working_dir: /usr/src/app
    command: sh -c "while true; do sleep 3600; done"
    profiles: [full]

  # ---------------------------------------------------------------------------
  # Neo4j — graph analytics + projection target
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community-ubi10
    environment:
      # NEO4J_PASSWORD must be set in .env — fail fast if missing
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      # Neo4j 5 uses server.memory.* namespace (dbms.memory.* was Neo4j 4.x)
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE:-512m}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP:-512m}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - swh_neo4j_data:/data
      - swh_neo4j_logs:/logs
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # SedonaDB -- single-node analytical database (Apache Sedona team).
  # Distributed as a Python library; this container wraps it in JupyterLab
  # for interactive exploration. Local-dev only (no auth). Opt-in profile.
  # ---------------------------------------------------------------------------
  sedonadb:
    build:
      context: docker/sedonadb
      args:
        - UBUNTU_BASE_IMAGE=${UBUNTU_BASE_IMAGE:-ubuntu:24.04}
        - PYTHON_VENV_PATH=${PYTHON_VENV_PATH:-/opt/venv}
    image: swh-sedonadb-image
    ports:
      - "127.0.0.1:${SEDONADB_PORT:-8889}:${SEDONADB_PORT:-8889}"
    environment:
      - SEDONADB_PORT=${SEDONADB_PORT:-8889}
    volumes:
      - swh_sedonadb_data:/home/sedonadb/work
    restart: unless-stopped
    profiles: [sedonadb, full]

volumes:
  swh_pg_data:
  swh_neo4j_data:
  swh_neo4j_logs:
  swh_sedonadb_data:
